# =============================================
# منصة تشارك - سيرفر النشر التلقائي
# Tasharak Platform - CI/CD Deployment Pipeline
# =============================================
# يتطلب إعداد GitHub Secrets التالية:
# See README for required GitHub Secrets

name: Deploy to Production

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  BUN_VERSION: 'latest'

jobs:
  # =============================================
  # اختبار الكود - Test
  # =============================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Run Linter
        run: bun run lint
        continue-on-error: true

      - name: Type Check
        run: bunx tsc --noEmit
        continue-on-error: true

  # =============================================
  # بناء التطبيق - Build
  # =============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build application
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1

  # =============================================
  # النشر عبر FTP - Deploy
  # =============================================
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    environment:
      name: production
      url: ${{ secrets.NEXT_PUBLIC_APP_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Create .env file
        run: |
          cat > .env << EOF
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          REFRESH_TOKEN_EXPIRES_IN=${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}
          WHATSAPP_API_URL=${{ secrets.WHATSAPP_API_URL }}
          WHATSAPP_API_KEY=${{ secrets.WHATSAPP_API_KEY }}
          WHATSAPP_PHONE_NUMBER=${{ secrets.WHATSAPP_PHONE_NUMBER }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_REKOGNITION_COLLECTION_ID=${{ secrets.AWS_REKOGNITION_COLLECTION_ID }}
          PAYMENT_MADA_API_KEY=${{ secrets.PAYMENT_MADA_API_KEY }}
          PAYMENT_APPLE_PAY_MERCHANT_ID=${{ secrets.PAYMENT_APPLE_PAY_MERCHANT_ID }}
          PAYMENT_STC_PAY_API_KEY=${{ secrets.PAYMENT_STC_PAY_API_KEY }}
          STORAGE_TYPE=${{ secrets.STORAGE_TYPE }}
          AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
          AWS_S3_ACCESS_KEY=${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY=${{ secrets.AWS_S3_SECRET_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          GOOGLE_ANALYTICS_ID=${{ secrets.GOOGLE_ANALYTICS_ID }}
          NODE_ENV=production
          EOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: .
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.gitignore
            **/node_modules/**
            **/.github/**
            **/test/**
            **/prompt/**
            **/.env.example
            **/*.log
            **/.next/cache/**
          dangerous-clean-slate: false
          security: loose

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ secrets.NEXT_PUBLIC_APP_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # =============================================
  # إشعار بالحالة - Notification
  # =============================================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()
    
    steps:
      - name: Send Success Notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          # يمكن إضافة إشعار عبر Slack أو Email هنا

      - name: Send Failure Notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          # يمكن إضافة إشعار عبر Slack أو Email هنا
